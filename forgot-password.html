<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Global Page Preloader -->
  <script src="js/preloader.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Stackly Premium Beauty Salon & Spa</title>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/main.css">
  
  <style>
    /* Auth Form Specific Styles */
    .auth-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      background: linear-gradient(rgba(253, 251, 247, 0.9), rgba(253, 251, 247, 0.9)), url('assets/hero_bg1.webp') no-repeat center center/cover;
    }
    
    .back-link:hover {
      color: var(--accent-gold) !important;
      transform: translateX(-3px);
    }
    
    .auth-card {
      background-color: var(--bg-white);
      border: 1px solid var(--border-gold);
      border-radius: var(--border-radius-sm);
      padding: 3.5rem 3rem;
      width: 100%;
      max-width: 500px;
      box-shadow: var(--shadow-medium);
      text-align: center;
    }
    
    .auth-logo {
      margin-bottom: -1.25rem;
    }
    
    .auth-logo img {
      height: 100px;
      transform: translateY(-7px);
      margin: 0 auto;
    }
    
    .auth-title {
      font-size: 2.2rem;
      color: var(--text-dark);
      margin-bottom: 0.5rem;
    }
    
    .auth-subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 2.5rem;
    }
    
    .auth-form {
      text-align: left;
    }
    
    .input-group {
      position: relative;
      margin-bottom: 2rem;
    }
    
    .form-control {
      width: 100%;
      padding: 1rem 0;
      border-bottom: 1px solid var(--border-gold);
      font-size: 1rem;
      background: transparent;
      color: var(--text-dark);
      transition: border-color 0.3s ease;
    }
    
    .form-control:focus {
      border-bottom-color: var(--accent-gold);
    }
    
    .form-label {
      position: absolute;
      top: 1rem;
      left: 0;
      font-size: 0.95rem;
      color: var(--text-muted);
      pointer-events: none;
      transition: all 0.3s ease;
    }
    
    .form-control:focus ~ .form-label,
    .form-control:not(:placeholder-shown) ~ .form-label {
      top: -12px;
      font-size: 0.75rem;
      color: var(--accent-gold);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    
    .auth-alert-success {
      background-color: var(--accent-gold-light);
      border: 1px solid var(--accent-gold);
      color: var(--accent-gold-hover);
      padding: 1rem;
      border-radius: var(--border-radius-sm);
      margin-bottom: 2rem;
      font-size: 0.9rem;
      display: none;
      text-align: center;
      line-height: 1.5;
    }
    
    .auth-footer-text {
      margin-top: 2rem;
      color: var(--text-muted);
      font-size: 0.95rem;
    }
    
    .auth-footer-text a {
      color: var(--accent-gold);
      font-weight: 600;
    }
    
    .auth-footer-text a:hover {
      color: var(--accent-gold-hover);
    }
  </style>
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-card scale-in">
      <div class="back-home-container" style="text-align: center; margin-bottom: 1.5rem; margin-top: -1.5rem;">
        <a href="index.html" class="back-link" style="color: var(--text-muted); text-decoration: none; font-size: 0.95rem; font-weight: 500; display: inline-flex; align-items: center; gap: 8px; transition: var(--transition-fast);">
          <i class="fas fa-arrow-left"></i> Back to Home
        </a>
      </div>
      <div class="auth-logo">
        <a href="index.html" class="no-transition">
          <img src="assets/Logo.webp" alt="Stackly Logo">
        </a>
      </div>
      
      <h2 class="auth-title">Reset Password</h2>
      <p class="auth-subtitle">Enter registered email to recover access</p>
      
      <div class="auth-alert-success" id="auth-success">
        Password reset link generated!<br>
        <span style="font-size:0.8rem; opacity:0.85;">For testing: user records have been printed in the console.</span>
      </div>
      
      <form class="auth-form" id="forgotForm" onsubmit="handleForgot(event)">
        <!-- Email Input -->
        <div class="input-group">
          <input type="email" class="form-control" id="email" placeholder=" " required>
          <label class="form-label" for="email">Email Address</label>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%;">Send Reset Link</button>
      </form>
      
      <p class="auth-footer-text">Remember password? <a href="login.html" class="no-transition">Back to Login</a></p>
    </div>
  </div>

  <!-- GSAP Core -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Fade in card
      gsap.fromTo('.auth-card', { opacity: 0, scale: 0.95 }, { opacity: 1, scale: 1, duration: 0.6, ease: 'power2.out' });
    });

    function handleForgot(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const successDiv = document.getElementById('auth-success');
      const form = document.getElementById('forgotForm');
      
      // Load current users from localStorage and log them for debugging
      const users = JSON.parse(localStorage.getItem('stackly_users')) || [];
      console.log("Current Registered Users for Password Recovery:", users);
      
      // Simulate success state
      successDiv.style.display = 'block';
      gsap.fromTo(successDiv, { opacity: 0, y: -10 }, { opacity: 1, y: 0, duration: 0.4 });
      
      form.reset();
    }
  </script>
</body>
</html>
