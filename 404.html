<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | Stackly Premium Beauty Salon & Spa</title>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/main.css">
  
  <style>
    .error-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      background: linear-gradient(rgba(253, 251, 247, 0.93), rgba(253, 251, 247, 0.93)), url('assets/hero_bg.webp') no-repeat center center/cover;
    }
    
    .error-card {
      background: var(--bg-white);
      border: 1px solid var(--border-gold);
      border-radius: var(--border-radius-lg);
      padding: 3.5rem 2.5rem;
      width: 100%;
      max-width: 520px;
      text-align: center;
      box-shadow: var(--shadow-deep);
      position: relative;
      overflow: hidden;
    }
    
    .error-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--accent-gold), var(--border-gold));
    }
    
    .brand-logo-container {
      margin-bottom: 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .brand-logo-container img {
      height: 90px;
      transform: translateY(-5px);
    }
    
    .brand-logo-container a {
      display: inline-block;
    }
    
    .error-code {
      font-family: var(--font-heading);
      font-size: 6.5rem;
      line-height: 1;
      color: var(--accent-gold);
      margin-bottom: 1rem;
      font-weight: 700;
      letter-spacing: -2px;
    }
    
    .error-title {
      font-family: var(--font-heading);
      font-size: 2rem;
      color: var(--text-dark);
      margin-bottom: 1rem;
      font-weight: 600;
    }
    
    .error-description {
      color: var(--text-muted);
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }
    
    .error-actions {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    
    @media (min-width: 480px) {
      .error-actions {
        flex-direction: row;
        justify-content: center;
      }
      .error-actions .btn {
        flex: 1;
      }
    }
  </style>
</head>
<body>

  <div class="error-wrapper">
    <div class="error-card">
      <div class="brand-logo-container">
        <a href="index.html">
          <img src="assets/Logo.webp" alt="Stackly Logo">
        </a>
      </div>
      
      <div class="error-code">404</div>
      <h1 class="error-title">Page Not Found</h1>
      <p class="error-description">
        The destination page you are trying to reach doesn't exist or is currently undergoing maintenance.
      </p>
      
      <div class="error-actions">
        <a href="index.html" class="btn btn-primary">
          <i class="fas fa-home" style="margin-right:8px;"></i> Go Home
        </a>
        <button class="btn btn-secondary" onclick="goBack()">
          <i class="fas fa-arrow-left" style="margin-right:8px;"></i> Go Back
        </button>
      </div>
    </div>
  </div>

  <script>
    function goBack() {
      // history.length === 1 means this page is the very first (and only) entry —
      // there is nothing to go back to, so redirect immediately.
      if (history.length <= 1) {
        window.location.href = 'index.html';
        return;
      }

      // Attempt to navigate back. Set a safety net: if the page is still
      // visible after 600 ms (history.back() had nowhere valid to go),
      // fall back to the home page to avoid an infinite loader / stuck state.
      const fallbackTimer = setTimeout(function () {
        window.location.href = 'index.html';
      }, 600);

      // If history.back() actually navigates away, the pagehide event fires
      // before the timer, so we cancel the fallback redirect.
      window.addEventListener('pagehide', function () {
        clearTimeout(fallbackTimer);
      }, { once: true });

      history.back();
    }
  </script>

</body>
</html>
